curriculum_id: firebase_platform_mastery
version: '1.0'
description: A comprehensive guide to mastering the Firebase platform, from setup
  to advanced AI integrations.
skills:
- id: terminal_basics
  title: Terminal Basics
  category: firebase_platform
  dependencies: []
  description: Learning how to navigate directories, list files, and execute scripts
    using a command-line interface (CLI).
  fast_track_assessment: Briefly explain how to navigate directories, list files,
    and execute scripts using a command line.
  verification:
    type: multiple_choice
    question: "Which command is used to create a new directory in most terminals?"
    options:
      - id: ls
        text: "ls"
      - id: cd
        text: "cd"
      - id: mkdir
        text: "mkdir"
      - id: touch
        text: "touch"
    correct_answer_id: mkdir
- id: json_fundamentals
  title: JSON Fundamentals
  category: firebase_platform
  dependencies: []
  description: Understanding the syntax and structure of JSON for data representation,
    including nesting and data types.
  fast_track_assessment: Briefly explain JSON Fundamentals and how it relates to Firebase.
  verification:
    type: llm_rubric
    instructions_to_user: User can write a valid JSON object without syntax errors.
- id: asynchronous_javascript_promises_async_await
  title: Asynchronous JavaScript (Promises/Async-Await)
  category: firebase_platform
  dependencies:
  - id: terminal_basics
    type: hard
  description: Mastering non-blocking code execution patterns required for network-based
    database calls.
  fast_track_assessment: Briefly explain Asynchronous JavaScript (Promises/Async-Await)
    and how it relates to Firebase.
  verification:
    type: llm_rubric
    instructions_to_user: User can explain how code continues execution while waiting
      for a network response.
- id: http_basics_and_rest_concepts
  title: HTTP Basics and REST Concepts
  category: firebase_platform
  dependencies:
  - id: json_fundamentals
    type: hard
  description: Understanding the request/response lifecycle, status codes, and HTTP
    methods (GET, POST, etc).
  fast_track_assessment: Briefly explain HTTP Basics and REST Concepts and how it
    relates to Firebase.
  verification:
    type: llm_rubric
    instructions_to_user: User can identify the difference between client-side errors
      (4xx) and server-side errors (5xx).
- id: git_and_version_control
  title: Git and Version Control
  category: firebase_platform
  dependencies:
  - id: terminal_basics
    type: hard
  description: Setting up local and remote repositories to track changes and collaborate
    on code.
  fast_track_assessment: Briefly explain Git and Version Control and how it relates
    to Firebase.
  verification:
    type: llm_rubric
    instructions_to_user: User can perform a git commit and push to a remote repository.
- id: node_js_and_npm_installation
  title: Node.js and NPM Installation
  category: firebase_platform
  dependencies:
  - id: terminal_basics
    type: hard
  description: Installing the JavaScript runtime and package manager required to run
    Firebase tools and libraries.
  fast_track_assessment: Briefly explain Node.js and NPM Installation and how it relates
    to Firebase.
  verification:
    type: command_check
    command: "node -v"
    expected_output: "regex:^v[0-9]+\\.[0-9]+\\.[0-9]+"
- id: identity_and_access_management_iam_concepts
  title: Identity and Access Management (IAM) Concepts
  category: firebase_platform
  dependencies:
  - id: http_basics_and_rest_concepts
    type: hard
  description: Conceptual understanding of Principals, Roles, and Permissions in cloud
    environments.
  fast_track_assessment: Briefly explain Identity and Access Management (IAM) Concepts
    and how it relates to Firebase.
  verification:
    type: llm_rubric
    instructions_to_user: User can explain the 'Principle of Least Privilege'.
- id: google_account_creation
  title: Google Account Creation
  category: firebase_platform
  dependencies: []
  description: Establishing a primary identity to manage Google Cloud and Firebase
    resources.
  fast_track_assessment: Briefly explain Google Account Creation and how it relates
    to Firebase.
  verification:
    type: llm_rubric
    instructions_to_user: Access to the Google/Firebase Console is granted.
- id: firebase_project_creation
  title: Firebase Project Creation
  category: firebase_platform
  dependencies:
  - id: google_account_creation
    type: hard
  - id: git_and_version_control
    type: hard
  description: 'Provisioning a unique project container in the Firebase Console. [Achievement:
    The Founder]'
  fast_track_assessment: Briefly explain Firebase Project Creation and how it relates
    to Firebase.
  verification:
    type: mcp_check
    mcp_server: "firebase-mcp-server"
    mcp_tool: "firebase_get_project"
    arguments: {}
    expected_result_field: "projectId"
    expected_value: "ANY"
- id: firebase_console_navigation
  title: Firebase Console Navigation
  category: firebase_platform
  dependencies:
  - id: firebase_project_creation
    type: hard
  - id: http_basics_and_rest_concepts
    type: hard
  description: Learning the layout of the project dashboard, including settings, usage,
    and product lists.
  fast_track_assessment: Briefly explain Firebase Console Navigation and how it relates
    to Firebase.
  verification:
    type: llm_rubric
    instructions_to_user: User can locate the 'Blaze Plan' upgrade button and API
      keys.
- id: firebase_cli_installation
