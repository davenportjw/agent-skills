  dependencies:
  - id: node_js_and_npm_installation
    type: hard
  - id: git_and_version_control
    type: hard
  description: Installing the firebase-tools package globally on the local machine.
  fast_track_assessment: Briefly explain Firebase CLI Installation and how it relates
    to Firebase.
  verification:
    type: environment_health_check
    instructions_to_user: Command 'firebase --version' returns a version number.
- id: firebase_cli_login
